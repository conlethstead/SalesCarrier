# Build in Google Cloud Build (no local Docker required).
# From metrics-dashboard/:
#   source .env && export IMAGE="us-central1-docker.pkg.dev/PROJECT/carrier-images/sales:tag"
#   gcloud builds submit . --config=cloudbuild.yaml \
#     --substitutions=_VITE_KEY="${VITE_API_KEY}",_IMAGE="${IMAGE}"
#
# Do not commit secrets; substitutions appear in Cloud Build job metadata.

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "VITE_API_KEY=${_VITE_KEY}"
      - "-t"
      - "${_IMAGE}"
      - "."

images:
  - "${_IMAGE}"

options:
  logging: CLOUD_LOGGING_ONLY
