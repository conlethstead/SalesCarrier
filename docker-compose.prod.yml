# Production: app behind Caddy with automatic HTTPS (Let's Encrypt).
# Usage:
#   export $(grep -v '^#' .env | xargs)   # or use docker compose --env-file .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Before first start: point DNS A/AAAA for METRICS_DOMAIN to this machine's public IP.

services:
  metrics:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY}
    environment:
      NODE_ENV: production
      PORT: 3001
      API_KEY: ${API_KEY}
      DATA_DIR: /data
    volumes:
      - carrier-metrics-data:/data
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      METRICS_DOMAIN: ${METRICS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metrics
    restart: unless-stopped

volumes:
  carrier-metrics-data:
  caddy-data:
  caddy-config:
